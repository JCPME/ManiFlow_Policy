env_runner: null


dataset:
  _target_: maniflow.dataset.custom_dataset.CustomDataset
  zarr_path: data/coffee_cup_expert.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
  use_feature_cache: False
  feature_cache_key: camera_1_r3m
