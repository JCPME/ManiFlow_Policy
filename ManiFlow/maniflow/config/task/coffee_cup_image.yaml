name: coffee_cup_image

task_name: coffee_cup

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim
  obs:
    image:
        shape: [3, 224, 224]
        type: rgb
        horizon: 2
    agent_pos:
      shape: [26]
      type: low_dim
      horizon: 2
  action:
    shape: [26]
    horizon: 16

