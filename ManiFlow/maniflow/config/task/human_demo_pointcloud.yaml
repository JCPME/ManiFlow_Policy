name: human_demo_pointcloud

task_name: human_demo

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim, point_cloud
  obs:
    point_cloud:
      # Human-demo cloud (offline_human_demo.py process --zarr-points P): FFS object points, xyz +
      # zeros in the force channels (no tactile yet; reserved). [x,y,z, 0,0,0]. Stored in the robot-EE
      # convention, first-EE anchored — the fixed-first-frame (--base-frame tcp_first) AND the Vive->ORCA
      # correction are BAKED offline (--anchor-correction), so deploy uses anchor_correction=identity.
      # The dataset re-anchors per the relative_to_ee convention below. Must equal --zarr-points.
      shape: [4096, 22]      # raw stored cloud = [xyz(3), force(3), dino(16)]; the policy's use_tactile/
      type: point_cloud      #   use_dino/dino_dim flags select which channels feed the encoder

      horizon: 2
    agent_pos:
      shape: [26]            # 3 pos + 6D rot + 17 hand joints (per relative_to_ee convention)
      type: low_dim
      horizon: 2
  action:
    shape: [26]             # 3 pos + 6D rot (EE-pose target) + 17 hand targets
    horizon: 16

env_runner: null

dataset:
  # Human-demo fork of TactilePointcloudDataset (same schema/math; separate so the deployed tactile +
  # coffee-cup path stays untouched). Reads meta.attrs['settings'] to record how the zarr was baked.
  _target_: maniflow.dataset.human_demo_pointcloud_dataset.HumanDemoPointcloudDataset
  zarr_path: data/human_demo.zarr   # merged multi-episode zarr (offline_human_demo.py merge-zarr)
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.15
  max_train_episodes: 1000
  relative_pointcloud: false
  # Coordinate-frame convention (the zarr is in the global episode-TCP frame, --base-frame tcp_first):
  #   true  -> encode obs+action (+cloud) RELATIVE to the last observed EE (pose deltas). The episode
  #            anchor is cancelled, so a tcp_first zarr == a world zarr in this mode. Deploy: compose the
  #            predicted delta onto the robot's current EE + express the cloud relative to it.
  #   false -> keep the global fixed frame = the episode-TCP frame (absolute targets). Deploy: anchor the
  #            robot to its own first EE per episode (inv(first_EE)) and command absolute targets in it.
  relative_to_ee: true
