name: coffee_cup_tactile_pointcloud

task_name: coffee_cup_tactile

shape_meta: &shape_meta
  # acceptable types: rgb, low_dim, point_cloud
  obs:
    point_cloud:
      # fused cloud (offline_hand_latch --zarr): FFS object points (force 0) + 363 ORCA taxels
      # (xyz + base-frame force). [x,y,z, fx,fy,fz], re-anchored to the last-observed-EE frame.
      # Must equal --zarr-points used at process time (object = total - 363).
      shape: [2048, 6]
      type: point_cloud
      horizon: 2
    agent_pos:
      shape: [26]            # 3 pos + 6D rot + 17 hand joints (relative to last observed EE pose)
      type: low_dim
      horizon: 2
  action:
    shape: [26]             # 3 pos + 6D rot (EE pose target, last-observed-EE frame) + 17 hand targets
    horizon: 16

env_runner: null

dataset:
  _target_: maniflow.dataset.tactile_pointcloud_dataset.TactilePointcloudDataset
  zarr_path: data/tactile_fused.zarr
  horizon: ${horizon}
  pad_before: ${eval:'${n_obs_steps}-1'}
  pad_after: ${eval:'${n_action_steps}-1'}
  seed: 42
  val_ratio: 0.02
  max_train_episodes: 90
  relative_pointcloud: true
